name: DemoQA Test Automation CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Install Firefox
        uses: browser-actions/setup-firefox@latest

      - name: Run Smoke tests (PR)
        if: github.event_name == 'pull_request'
        run: mvn -B clean test -Dgroups=smoke -Dbrowser=firefox -Dheadless=true

      - name: Run Full suite (push/schedule)
        if: github.event_name != 'pull_request'
        run: mvn -B clean test -Dbrowser=firefox -Dheadless=true

      - name: Upload Surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports
